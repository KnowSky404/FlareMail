name = "flaremail"
main = "build/_worker.js"
compatibility_date = "2026-03-24"
compatibility_flags = ["nodejs_compat"]

[vars]
OUTBOUND_PROVIDER = "demo"
OUTBOUND_FROM_EMAIL = "dev@example.com"
OUTBOUND_FROM_NAME = "FlareMail"
AUTO_REPLY_ENABLED = "false"
AUTO_REPLY_SUBJECT_PREFIX = "Re:"
AUTO_REPLY_TEXT = "你好，我们已经收到你的邮件，会尽快处理。\n\nThis is an automated reply from FlareMail on Cloudflare Workers."
INBOUND_NOTIFICATION_ENABLED = "false"
NOTIFICATION_EMAIL = "ops@example.com"
NOTIFICATION_SUBJECT_PREFIX = "[FlareMail] 新入站邮件"

# 生产环境请通过 `bun x wrangler secret put RESEND_API_KEY`
# 和 `bun x wrangler secret put RESEND_WEBHOOK_SECRET` 注入真实密钥。
#
# 请不要把真实邮箱、资源 ID 或生产配置直接提交到仓库。
# 推荐做法：
# - 本地开发：使用 `.dev.vars`（可参考 `.dev.vars.example`）
# - 生产部署：在 Cloudflare Dashboard 或 CI/CD 中覆盖这些变量
# - 如果要让工作台 UI 发送切换到 Cloudflare 原生外发，再把 `OUTBOUND_PROVIDER` 改成 `cloudflare`

[[send_email]]
name = "OUTBOUND_EMAIL"
allowed_destination_addresses = ["ops@example.com"]
allowed_sender_addresses = ["dev@example.com"]

[assets]
directory = "build"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "flaremail-db"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "flaremail-bucket"
preview_bucket_name = "flaremail-bucket-preview"
